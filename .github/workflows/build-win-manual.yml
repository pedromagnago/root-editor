name: Build Windows (manual)

# Produz um instalador Windows do Root Editor sob demanda, como artefato de build.
#
# Por que este workflow existe: os workflows de release (release-stable, release-beta,
# cut-release) estao travados em `github.repository == 'nexu-io/open-design'` e dependem
# de segredos do upstream (R2, PostHog, assinatura). No fork eles nunca rodam, entao
# nenhum .exe jamais foi gerado. Este job faz so o build e sobe o resultado como
# artefato do GitHub Actions -- sem publicar, sem assinar, sem tocar em release.

on:
  workflow_dispatch:
    inputs:
      to:
        description: "Alvo do build: nsis (instalador) | zip (portatil) | all"
        type: choice
        default: nsis
        options: [nsis, zip, all]

jobs:
  build_win_x64:
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.33.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup NSIS
        shell: pwsh
        run: |
          if ((Get-Command makensis.exe -ErrorAction SilentlyContinue) -or (Test-Path "C:\Program Files (x86)\NSIS\makensis.exe")) {
            exit 0
          }
          choco install nsis -y --no-progress

      # Sem --require-vela-cli: o Vela CLI e opcional no empacotamento
      # (copyOptionalVelaCliBinary devolve null quando nao resolve) e exigi-lo
      # faria o primeiro build falhar por uma dependencia que o fork nao usa.
      - name: Build windows artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          pnpm exec tools-pack win build `
            --dir "$env:RUNNER_TEMP/tools-pack" `
            --namespace "manual" `
            --portable `
            --to "${{ inputs.to }}" `
            --json

      - name: Collect artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $out = Join-Path $env:RUNNER_TEMP "win-artifacts"
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          $found = Get-ChildItem -Path "$env:RUNNER_TEMP/tools-pack" -Recurse -Include *.exe, *.zip `
            | Where-Object { $_.DirectoryName -like "*\builder" }
          if ($found.Count -eq 0) {
            throw "nenhum instalador encontrado em $env:RUNNER_TEMP/tools-pack/**/builder"
          }
          $found | ForEach-Object {
            Write-Host "artefato: $($_.FullName) ($([math]::Round($_.Length / 1MB, 1)) MB)"
            Copy-Item $_.FullName -Destination $out
          }

      - name: Upload installer
        uses: actions/upload-artifact@v7
        with:
          name: root-editor-windows-x64
          path: ${{ runner.temp }}/win-artifacts
          if-no-files-found: error
          retention-days: 14
